<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #f7fbff 0%, #eef5ff 100%);
            margin: 0;
            padding: 0;
            color: #1f2a44;
        }
        .page {
            max-width: 1000px;
            margin: 40px auto;
            padding: 24px;
        }
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .top-bar h1 {
            margin: 0;
            font-size: 2rem;
        }
        .button,
        .back-button {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 999px;
            text-decoration: none;
            color: white;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.18);
        }
        .button:hover,
        .back-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(59, 130, 246, 0.2);
        }
        .card {
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th,
        td {
            padding: 16px 14px;
            text-align: left;
        }
        th {
            background: #eef4ff;
            font-weight: 700;
            letter-spacing: 0.02em;
            font-size: 0.95rem;
            color: #23395d;
        }
        tr {
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        }
        tr:last-child {
            border-bottom: none;
        }
        td {
            color: #3b4979;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .actions a {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .actions a.edit {
            background: #dbeafe;
            color: #1e40af;
        }
        .actions a.delete {
            background: #fee2e2;
            color: #991b1b;
        }
        @media (max-width: 720px) {
            .top-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            th,
            td {
                padding: 12px 10px;
            }
            .actions {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-bar">
            <div>
                <h1>Doctors<br><span style="font-size:1rem; color:#4b5563;">Clean list view with edit and delete actions</span></h1>
            </div>
            <a href="/dashboard/" class="back-button">Back to Dashboard</a>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Specialization</th>
                        <th>Edit / Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for d in doctors %}
                    <tr>
                        <td>{{ d.id }}</td>
                        <td>{{ d.name }}</td>
                        <td>{{ d.specialization }}</td>
                        <td>
                            <div class="actions">
                                <a href="/doctors/{{ d.id }}/edit/" class="edit">Edit</a>
                                <a href="/doctors/{{ d.id }}/delete/" class="delete">Delete</a>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" style="padding: 18px; color: #475569;">No doctors found yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
