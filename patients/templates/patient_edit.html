<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #fcfcff 0%, #eef8ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255,255,255,0.94);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 28px 68px rgba(15, 23, 42, 0.08);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            color: #1f2937;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        input {
            padding: 12px 16px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 8px;
            font-size: 16px;
            background: white;
        }
        input:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(90deg, #0ea5e9, #2563eb);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Edit Patient</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="name" value="{{patient.name}}" required>
            <input type="text" name="phone" value="{{patient.phone}}" required>
            <button type="submit">Save Changes</button>
        </form>
    </div>
</body>
</html>
